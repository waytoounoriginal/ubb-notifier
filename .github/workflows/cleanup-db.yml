name: Cleanup Database

on:
  workflow_dispatch:

jobs:
  cleanup-redis:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install redis

      - name: Clear seen article IDs from Redis
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          python -c "import os, redis; r = redis.Redis.from_url(os.environ['REDIS_URL']); r.delete('ubb_notifier:seen_article_ids')"
